spring:
  devtools:
    restart:
      enabled: true
      poll-interval: 1s
      quiet-period: 400ms

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

supabase:
  url: ${SUPABASE_URL}
  key: ${SUPABASE_KEY}

jwt:
  secret: ${JWT_SECRET}

app:
  cors:
    allowed-origins: ${FRONTEND_URL}
    allowed-methods: GET, POST, PUT, DELETE, OPTIONS
    allowed-headers: Content-Type, Authorization
    allow-credentials: true
